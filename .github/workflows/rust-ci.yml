name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Uses Node 20/24 compatible version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt Check
        run: cargo fmt --all -- --check

      - name: Clippy Lint
        run: cargo clippy -- -D warnings

      - name: Cargo Deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories

      # 🧨 Detect unsafe Rust usage
      - name: Unsafe Code Scan
        run: |
          cargo install cargo-geiger --locked
          cargo geiger

      - name: Run Tests
        run: cargo test

      - name: Security Audit
        # We use a dedicated action for speed instead of manual cargo install
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
